<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>syntaxwear-tenis e sneakers online</title>
    <link rel="shortcut icon" href="assets/favicon/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="./css/reset.css">
    <link rel="stylesheet" href="./css/variable.css">
    <link rel="stylesheet" href="./css/base.css">
    <link rel="stylesheet" href="./css/global.css">
    <link rel="stylesheet" href="./css/components/header.css">
    <link rel="stylesheet" href="./css/components/hero.css">
    <link rel="stylesheet" href="./css/components/categories.css">
    <link rel="stylesheet" href="./css/components/produtos-grid.css">
    <!-- Pronto para adicionar JS -->
</head>

<body>
    <header class="header">
        <!-- Header -->
        <h1 class="logo">
            <a href="/" title="syntaxwear-tenis e sneakers online">
                <img src="./assets/images/logo/logo.svg" alt="Logo da Loja">
            </a>
        </h1>
        <nav class="nav-center" aria-label="categorias principais">
            <ul>
                <li><a href="#">masculino</a></li>
                <li><a href="#">feminino</a></li>
                <li><a href="#">outlet</a></li>
            </ul>
        </nav>


        <!-- Menu secundário abaixo do último nav -->
        <nav class="nav-secondary" aria-label="menu secundário">
            <ul>
                <li aria-label="Link para nossas lojas"><a href="#">Nossas lojas</a></li>
                <li aria-label="Link sobre a empresa"><a href="#">Sobre</a></li>
                <li aria-label="Link para login do usuário">
                    <a href="#" title="Login">
                        <img src="./assets/images/icons/user.svg" alt="Usuário">
                    </a>
                </li>
                <li aria-label="Link para ajuda e perguntas frequentes">
                    <a href="#" title="Ajuda">
                        <img src="./assets/images/icons/help.svg" alt="Ajuda">
                    </a>
                </li>
                <li aria-label="Link para o carrinho de compras">
                    <a href="#" title="Carrinho">
                        <img src="./assets/images/icons/cart.svg" alt="Carrinho">
                    </a>
                </li>
            </ul>
        </nav>



    </header>

    <main>
        <section class="hero">
            <!-- Hero Section (banner principal) -->
            <div class="hero-overlay">
                <div class="hero-content">
                    <span class="hero-sub">Krypton one</span>
                    <h2 class="hero-tittle">Transfome qualquer passo em presença.</h2>
                    <div class="hero-buttons">
                        <a href="#" class="btn btn-outline">ver modelos</a>
                        <a href="#" class="btn btn-filled">comprar</a>

                    </div>

                </div>
            </div>



        </section>

        <section class="categories">
            <!-- Seção de Categorias -->

            <div class="categories-card casual">
                <a href="#" class="category-card">
                    <span class="overlay"></span>
                    <span class="name btn btn-outline">casual</span>
                </a>
            </div>
            <div class="categories-card esporte">
                <a href="#" class="category-card">
                    <span class="overlay"></span>
                    <span class="name btn btn-outline">esporte</span>
                </a>
            </div>
            <div class="categories-card moderno">
                <a href="#" class="category-card">
                    <span class="overlay"></span>
                    <span class="name btn btn-outline">moderno</span>
                </a>
            </div>
            <div class="categories-card futurista">
                <a href="#" class="category-card">
                    <span class="overlay"></span>
                    <span class="name btn btn-outline">futurista</span>
                </a>
            </div>





        </section>

        <section class="grid">
            <!-- seção de grade do site -->
            <div class="card top1">
                <div class="top1-content">
                    <h3 class="card-tittle">krypton one</h3>
                    <p class="card-subtittle">explore os modelos mais recentes</p>
                    <div >
                        <a href="#" class="btn btn-outline">feminino</a>
                        <a href="#" class="btn btn-outline">masculino</a>
                    </div>




                </div>


            </div>
            <div class="card top2"></div>
            <div class="card midL"></div>
            <div class="card midR"></div>
            <div class="card botL"></div>
            <div class="card botR"></div>
        </section>
    </main>

    <footer class="site-footer">
        <!-- Footer -->
    </footer>

</html>
